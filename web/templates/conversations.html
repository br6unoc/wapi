{{ template "layout.html" . }}
{{ define "title" }}Conversas — BotWapp{{ end }}
{{ define "content" }}

<script>
const TOKEN = document.querySelector('meta[name="auth-token"]')?.content || '';

function conversationsPage() {
  return {
    conversations: [],
    activeConv: null,
    messages: [],
    messageInput: '',
    sending: false,
    ws: null,
    wsStatus: 'connecting',
    mobilePanel: 'list',
    sending: false,

    init() {
      this.loadConversations();
      this.connectWS();
    },

    async loadConversations() {
      try {
        const resp = await fetch('/api/conversations', {
          headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        const data = await resp.json();
        this.conversations = Array.isArray(data) ? data : [];
      } catch(e) { console.error('loadConversations:', e); }
    },

    async selectConv(conv) {
      this.activeConv = conv;
      this.mobilePanel = 'thread';
      this.messages = [];
      conv.unread_count = 0;
      try {
        const resp = await fetch(`/api/conversations/${conv.instance_name}/${conv.phone}/messages`, {
          headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        this.messages = await resp.json();
        this.$nextTick(() => this.scrollToBottom());
      } catch(e) { console.error('selectConv:', e); }
      fetch(`/api/conversations/${conv.instance_name}/${conv.phone}/read`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${TOKEN}` }
      }).catch(() => {});
    },

    goBack() {
      this.activeConv = null;
      this.mobilePanel = 'list';
      this.messages = [];
    },

    connectWS() {
      if (this.ws && this.ws.readyState < 2) this.ws.close();
      this.wsStatus = 'connecting';
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/ws?token=${TOKEN}`);
      this.ws = ws;

      ws.onopen = () => {
        this.wsStatus = 'connected';
        this.loadConversations();
      };

      ws.onmessage = (e) => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.event === 'ping') return;
        if (msg.event !== 'new_message') return;
        const d = msg.data;
        const idx = this.conversations.findIndex(c =>
          c.contact_id === d.contact_id && c.instance_id === d.instance_id
        );
        if (idx > -1) {
          const conv = this.conversations.splice(idx, 1)[0];
          conv.last_message = d.content;
          conv.last_direction = d.direction;
          conv.last_type = d.type;
          conv.last_message_at = d.created_at;
          if (d.direction === 'in') {
            const isActive = this.activeConv &&
              this.activeConv.contact_id === d.contact_id &&
              this.activeConv.instance_id === d.instance_id;
            if (!isActive) {
              conv.unread_count = (conv.unread_count || 0) + 1;
            } else {
              fetch(`/api/conversations/${d.instance_name}/${d.phone}/read`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${TOKEN}` }
              }).catch(() => {});
            }
          }
          this.conversations.unshift(conv);
        } else {
          this.loadConversations();
        }
        if (this.activeConv &&
            this.activeConv.contact_id === d.contact_id &&
            this.activeConv.instance_id === d.instance_id) {
          // Se era uma mensagem enviada por nós, substitui a entrada temporária
          if (d.direction === 'out') {
            const tempIdx = this.messages.findIndex(m => m._pending && m.content === d.content);
            if (tempIdx > -1) {
              this.messages.splice(tempIdx, 1, d);
            } else {
              this.messages.push(d);
            }
          } else {
            this.messages.push(d);
          }
          this.$nextTick(() => this.scrollToBottom());
        }
      };

      ws.onclose = () => {
        if (this.ws !== ws) return;
        this.wsStatus = 'disconnected';
        setTimeout(() => { if (this.ws === ws) this.connectWS(); }, 3000);
      };

      ws.onerror = () => ws.close();
    },

    async sendMessage() {
      if (!this.messageInput.trim() || !this.activeConv) return;
      const text = this.messageInput.trim();
      this.messageInput = '';

      // Update otimista: mostra a mensagem imediatamente na thread
      const tempId = 'temp-' + Date.now();
      this.messages.push({
        id: tempId,
        direction: 'out',
        content: text,
        type: 'text',
        created_at: new Date().toISOString(),
        _pending: true,
      });
      this.$nextTick(() => this.scrollToBottom());

      // Envia em background — não trava o UI
      fetch(
        `/api/conversations/${this.activeConv.instance_name}/${this.activeConv.phone}/send`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
          body: JSON.stringify({ message: text })
        }
      ).then(resp => {
        if (!resp.ok) {
          this.messages = this.messages.filter(m => m.id !== tempId);
          this.messageInput = text;
          resp.json().catch(() => ({})).then(err => alert('Erro ao enviar: ' + (err.error || resp.status)));
        }
      }).catch(e => {
        this.messages = this.messages.filter(m => m.id !== tempId);
        this.messageInput = text;
        alert('Erro ao enviar: ' + e.message);
      });
    },

    scrollToBottom() {
      const el = document.getElementById('msg-list');
      if (el) el.scrollTop = el.scrollHeight;
    },

    msgPreview(type, content) {
      if (type === 'image') return '🖼️ Imagem';
      if (type === 'audio' || type === 'ptt') return '🎵 Áudio';
      if (type === 'video') return '🎬 Vídeo';
      if (type === 'document') return '📄 Documento';
      return content;
    },

    formatTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    },

    formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso), today = new Date();
      if (d.toDateString() === today.toDateString()) return 'hoje';
      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return 'ontem';
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
    }
  }
}
</script>

<div x-data="conversationsPage()" x-init="init()" class="flex overflow-hidden bg-white" style="height:100%;max-height:100%;">

  <!-- PAINEL ESQUERDO: lista de conversas -->
  <div class="flex flex-col bg-white border-r border-gray-200 flex-shrink-0 w-full sm:w-80 min-h-0"
       :class="mobilePanel === 'thread' ? 'hidden sm:flex' : 'flex'">

    <div class="flex items-center justify-between px-4 py-3.5 border-b border-gray-100 bg-white">
      <div class="flex items-center gap-2">
        <h2 class="text-sm font-semibold text-gray-800">Conversas</h2>
        <span x-show="wsStatus === 'connected'"
          class="w-2 h-2 rounded-full bg-green-400 flex-shrink-0" title="Tempo real ativo"></span>
        <span x-show="wsStatus === 'connecting'"
          class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse flex-shrink-0" title="Conectando..."></span>
        <span x-show="wsStatus === 'disconnected'"
          class="w-2 h-2 rounded-full bg-red-400 flex-shrink-0" title="Desconectado — reconectando..."></span>
      </div>
      <button @click="loadConversations()"
        class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto divide-y divide-gray-50">
      <template x-if="conversations.length === 0">
        <div class="flex flex-col items-center justify-center h-full text-gray-400 px-6 text-center py-12">
          <svg class="w-10 h-10 mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
          </svg>
          <p class="text-sm font-medium text-gray-500">Nenhuma conversa</p>
          <p class="text-xs mt-1">Mensagens recebidas aparecerão aqui</p>
        </div>
      </template>

      <template x-for="conv in conversations" :key="conv.contact_id + conv.instance_id">
        <div @click="selectConv(conv)"
          class="px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors"
          :class="activeConv && activeConv.contact_id === conv.contact_id
            ? 'bg-blue-50 border-l-2 border-l-blue-500'
            : 'border-l-2 border-l-transparent'">

          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center text-white text-sm font-bold"
              style="background:linear-gradient(135deg,#4f6ef7,#6b8afb)"
              x-text="(conv.name || conv.phone).charAt(0).toUpperCase()">
            </div>

            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-0.5">
                <span class="text-sm font-semibold text-gray-800 truncate mr-2"
                  x-text="conv.name || conv.phone"></span>
                <span class="text-[11px] text-gray-400 flex-shrink-0"
                  x-text="formatDate(conv.last_message_at) !== 'hoje'
                    ? formatDate(conv.last_message_at)
                    : formatTime(conv.last_message_at)">
                </span>
              </div>

              <div class="flex items-center justify-between gap-2">
                <p class="text-xs text-gray-500 truncate flex-1">
                  <span x-show="conv.last_direction === 'out'" class="text-blue-500 font-medium">Você: </span>
                  <span x-text="msgPreview(conv.last_type, conv.last_message)"></span>
                </p>
                <template x-if="conv.unread_count > 0">
                  <span class="flex-shrink-0 min-w-[20px] h-5 rounded-full bg-green-500 text-white text-[10px] font-bold flex items-center justify-center px-1.5"
                    x-text="conv.unread_count > 99 ? '99+' : conv.unread_count">
                  </span>
                </template>
              </div>

              <div class="mt-1 flex items-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-green-400 flex-shrink-0"></span>
                <span class="text-[10px] text-gray-400" x-text="conv.instance_name"></span>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- PAINEL DIREITO: thread -->
  <div class="flex-1 flex flex-col min-w-0 min-h-0 overflow-hidden"
       style="background:#f0f2f5"
       :class="mobilePanel === 'list' ? 'hidden sm:flex' : 'flex'">

    <div class="bg-white border-b border-gray-200 px-5 py-3 flex items-center gap-3 flex-shrink-0 shadow-sm">
      <button @click="goBack()" class="sm:hidden text-gray-400 hover:text-gray-700 mr-1 flex-shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>

      <template x-if="activeConv">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 text-white text-sm font-bold"
            style="background:linear-gradient(135deg,#4f6ef7,#6b8afb)"
            x-text="(activeConv.name || activeConv.phone).charAt(0).toUpperCase()"></div>
          <div class="min-w-0">
            <p class="text-sm font-semibold text-gray-800 truncate"
              x-text="activeConv.name || activeConv.phone"></p>
            <p class="text-xs text-gray-400">
              +<span x-text="activeConv.phone"></span>
              <span class="mx-1">·</span>
              <span x-text="activeConv.instance_name"></span>
            </p>
          </div>
        </div>
      </template>

      <template x-if="!activeConv">
        <p class="text-sm text-gray-400 hidden sm:block">Selecione uma conversa</p>
      </template>
    </div>

    <div id="msg-list" class="flex-1 overflow-y-auto px-4 sm:px-6 py-4 space-y-1.5">
      <template x-if="!activeConv">
        <div class="flex flex-col items-center justify-center h-full text-gray-300">
          <svg class="w-16 h-16 mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2h-5l-5 5v-5z"/>
          </svg>
          <p class="text-sm">Selecione uma conversa para começar</p>
        </div>
      </template>

      <template x-for="msg in messages" :key="msg.id">
        <div class="flex" :class="msg.direction === 'out' ? 'justify-end' : 'justify-start'">
          <div class="max-w-[75%] sm:max-w-md px-3.5 py-2 rounded-2xl text-sm shadow-sm"
            :class="msg.direction === 'out'
              ? 'bg-[#dcf8c6] text-gray-800 rounded-br-sm'
              : 'bg-white text-gray-800 rounded-bl-sm border border-gray-100'">

            <template x-if="msg.type === 'image'">
              <div>
                <div x-show="!!msg.media_path">
                  <a :href="msg.media_path" target="_blank" rel="noopener">
                    <img :src="msg.media_path" class="rounded-xl max-w-[240px] max-h-[320px] object-cover cursor-pointer" loading="lazy" />
                  </a>
                </div>
                <div x-show="!msg.media_path" class="flex items-center gap-2 text-gray-500">
                  <span class="text-lg">🖼️</span><span>Imagem</span>
                </div>
                <p x-show="msg.content && msg.content !== '[imagem]'" class="text-sm mt-1 break-words" x-text="msg.content"></p>
              </div>
            </template>

            <template x-if="msg.type === 'video'">
              <div>
                <div x-show="!!msg.media_path">
                  <video controls preload="metadata" class="rounded-xl max-w-[280px] max-h-[320px]">
                    <source :src="msg.media_path" type="video/mp4">
                  </video>
                </div>
                <div x-show="!msg.media_path" class="flex items-center gap-2 text-gray-500">
                  <span class="text-lg">🎬</span><span>Vídeo</span>
                </div>
                <p x-show="msg.content && msg.content !== '[vídeo]'" class="text-sm mt-1 break-words" x-text="msg.content"></p>
              </div>
            </template>

            <template x-if="msg.type === 'document'">
              <div>
                <a x-show="!!msg.media_path" :href="msg.media_path" :download="msg.media_name || 'documento'"
                  class="flex items-center gap-2.5 px-3 py-2.5 bg-gray-50 rounded-xl border border-gray-200 hover:bg-gray-100 transition-colors max-w-[240px]">
                  <svg class="w-8 h-8 text-blue-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                  </svg>
                  <div class="min-w-0">
                    <p class="text-xs font-medium text-gray-700 truncate" x-text="msg.media_name || 'Documento'"></p>
                    <p class="text-[10px] text-gray-400">Toque para baixar</p>
                  </div>
                </a>
                <div x-show="!msg.media_path" class="flex items-center gap-2 text-gray-500">
                  <span class="text-lg">📄</span>
                  <span x-text="msg.media_name || 'Documento'"></span>
                </div>
              </div>
            </template>
            <template x-if="msg.type === 'audio' || msg.type === 'ptt'">
              <div class="space-y-2" x-data="{ transcribing: false, transcribed: msg.content !== '[áudio]' && msg.content !== '' }">
                <template x-if="msg.media_path">
                  <audio controls preload="none" class="w-full max-w-xs h-8" style="min-width:200px">
                    <source :src="msg.media_path" type="audio/ogg">
                  </audio>
                </template>
                <template x-if="!msg.media_path">
                  <div class="flex items-center gap-2 text-gray-500">
                    <span class="text-lg">🎵</span><span>Áudio</span>
                  </div>
                </template>
                <template x-if="transcribed">
                  <p class="text-xs text-gray-600 italic border-l-2 border-gray-300 pl-2" x-text="msg.content"></p>
                </template>
                <template x-if="!transcribed && msg.media_path">
                  <button
                    @click="transcribing = true; fetch('/api/messages/' + msg.id + '/transcribe', { method: 'POST', headers: { 'Authorization': 'Bearer ' + TOKEN } }).then(r => r.json()).then(d => { if (d.text) { msg.content = d.text; transcribed = true; } }).finally(() => transcribing = false)"
                    :disabled="transcribing"
                    class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium transition-colors"
                    :class="transcribing ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-blue-50 hover:bg-blue-100 text-blue-600'">
                    <template x-if="!transcribing">
                      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                      </svg>
                    </template>
                    <template x-if="transcribing">
                      <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                      </svg>
                    </template>
                    <span x-text="transcribing ? 'Transcrevendo...' : 'Transcrever'"></span>
                  </button>
                </template>
              </div>
            </template>
            <template x-if="msg.type === 'text' || msg.type === ''">
              <p x-text="msg.content" class="break-words whitespace-pre-wrap leading-relaxed"></p>
            </template>

            <div class="flex items-center justify-end gap-1 mt-1">
              <span class="text-[10px]"
                :class="msg.direction === 'out' ? 'text-gray-500' : 'text-gray-400'"
                x-text="formatTime(msg.created_at)"></span>
              <template x-if="msg.direction === 'out'">
                <svg class="w-3 h-3 text-blue-500" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M12.354 4.354a.5.5 0 000-.708l-.708-.708a.5.5 0 00-.707.001L5.5 9.793 3.561 7.854a.5.5 0 10-.708.708l2.647 2.646a.5.5 0 00.708 0l6.146-6.854z"/>
                  <path d="M6.5 11.793L3.207 8.5l.708-.708 3.585 3.586-.707.707z"/>
                </svg>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>

    <div class="bg-white border-t border-gray-100 px-4 py-3 flex-shrink-0" style="padding-bottom:max(12px,env(safe-area-inset-bottom));">
      <template x-if="activeConv">
        <div class="flex items-end gap-2">
          <textarea
            x-model="messageInput"
            @keydown.enter.prevent="!$event.shiftKey && sendMessage()"
            placeholder="Digite uma mensagem... (Enter para enviar, Shift+Enter para quebrar linha)"
            :disabled="sending"
            rows="1"
            @input="$el.style.height='auto'; $el.style.height=Math.min($el.scrollHeight,120)+'px'"
            class="flex-1 bg-gray-50 border border-gray-200 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-colors disabled:opacity-50 resize-none overflow-hidden min-h-[42px]"
            style="max-height:120px"
          ></textarea>
          <button @click="sendMessage()"
            :disabled="sending || !messageInput.trim()"
            class="w-10 h-10 flex-shrink-0 rounded-full flex items-center justify-center transition-all"
            :class="messageInput.trim() && !sending
              ? 'bg-green-500 hover:bg-green-600 text-white shadow-sm'
              : 'bg-gray-200 text-gray-400 cursor-not-allowed'">
            <svg x-show="!sending" class="w-4 h-4 ml-0.5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
            </svg>
            <svg x-show="sending" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </button>
        </div>
      </template>
      <template x-if="!activeConv">
        <p class="text-center text-xs text-gray-300 py-1 hidden sm:block">
          Selecione uma conversa para responder
        </p>
      </template>
    </div>
  </div>
</div>
{{ end }}
