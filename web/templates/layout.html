<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="auth-token" content="{{ .Token }}">
  <title>{{ block "title" . }}WAPI{{ end }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .sidebar-link { @apply flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-700/60 transition-colors cursor-pointer; }
    .sidebar-link.active { @apply text-white bg-slate-700; }
  </style>
</head>
<body class="h-screen overflow-hidden flex bg-slate-100" x-data="{ sidebarOpen: false }">

  {{ if .Token }}
  <!-- Overlay mobile -->
  <div x-show="sidebarOpen" x-cloak @click="sidebarOpen = false"
    class="fixed inset-0 bg-black/60 z-40 sm:hidden"></div>

  <!-- Sidebar -->
  <aside
    class="fixed sm:static inset-y-0 left-0 z-50 flex flex-col bg-slate-900 transition-transform duration-200 sm:translate-x-0 flex-shrink-0"
    style="width: 220px;"
    :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full sm:translate-x-0'">

    <!-- Brand + fechar -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-700/60">
      <span class="text-white font-bold text-lg tracking-tight">WAPI</span>
      <button @click="sidebarOpen = false" class="sm:hidden text-slate-500 hover:text-white p-0.5 rounded">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <a href="/connections" @click="sidebarOpen = false"
        class="sidebar-link" :class="location.pathname === '/connections' ? 'active' : ''">
        Conexões
      </a>
      <a href="/conversations" @click="sidebarOpen = false"
        class="sidebar-link" :class="location.pathname === '/conversations' ? 'active' : ''">
        Conversas
      </a>
    </nav>

    <!-- Usuário + Sair -->
    <div class="px-4 py-4 border-t border-slate-700/60">
      <p class="text-xs text-slate-500 truncate mb-1">{{ .Username }}</p>
      <a href="/logout" class="text-xs text-red-400 hover:text-red-300 transition-colors font-medium">Sair</a>
    </div>
  </aside>
  {{ end }}

  <!-- Área principal -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    {{ if .Token }}
    <!-- Topbar mobile -->
    <header class="sm:hidden flex items-center gap-3 bg-slate-900 border-b border-slate-700 px-4 h-14 flex-shrink-0">
      <button @click="sidebarOpen = true" class="text-slate-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <span class="font-bold text-white tracking-tight">WAPI</span>
    </header>
    {{ end }}

    <!-- Conteúdo -->
    <main class="flex-1 min-h-0">
      {{ block "content" . }}{{ end }}
    </main>
  </div>

</body>
</html>
