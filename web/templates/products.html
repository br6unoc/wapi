{{ template "layout.html" . }}
{{ define "title" }}Produtos — BotWapp{{ end }}
{{ define "content" }}
<script>
const TOKEN = document.querySelector('meta[name="auth-token"]')?.content || '';

function productsPage() {
  return {
    products: [],
    loading: true,
    showForm: false,
    saving: false,
    editingId: null,
    form: { name: '', description: '', price: '', active: true },
    error: '',

    async init() { await this.load(); },

    async load() {
      this.loading = true;
      try {
        const r = await fetch('/api/products', { headers: { 'Authorization': `Bearer ${TOKEN}` } });
        this.products = await r.json();
      } finally { this.loading = false; }
    },

    openCreate() {
      this.editingId = null;
      this.form = { name: '', description: '', price: '', active: true };
      this.error = '';
      this.showForm = true;
    },

    openEdit(p) {
      this.editingId = p.id;
      this.form = { name: p.name, description: p.description, price: p.price || '', active: p.active };
      this.error = '';
      this.showForm = true;
    },

    async save() {
      if (!this.form.name.trim()) { this.error = 'Nome é obrigatório'; return; }
      this.saving = true; this.error = '';
      try {
        const url = this.editingId ? `/api/products/${this.editingId}` : '/api/products';
        const method = this.editingId ? 'PUT' : 'POST';
        const r = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
          body: JSON.stringify(this.form)
        });
        if (!r.ok) { const e = await r.json(); this.error = e.error || 'Erro'; return; }
        this.showForm = false;
        await this.load();
      } finally { this.saving = false; }
    },

    async remove(id) {
      if (!confirm('Excluir produto?')) return;
      await fetch(`/api/products/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${TOKEN}` } });
      await this.load();
    },

    async toggleActive(p) {
      await fetch(`/api/products/${p.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
        body: JSON.stringify({ name: p.name, description: p.description, price: p.price || '', active: !p.active })
      });
      await this.load();
    },
  }
}
</script>

<div x-data="productsPage()" x-init="init()" class="p-6 max-w-3xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-gray-900">Produtos</h1>
      <p class="text-sm text-gray-500 mt-0.5">Catálogo injetado automaticamente no contexto do AI</p>
    </div>
    <button @click="openCreate()"
      class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Novo produto
    </button>
  </div>

  <!-- Loading -->
  <template x-if="loading">
    <div class="flex justify-center py-12">
      <svg class="w-6 h-6 animate-spin text-blue-500" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>
  </template>

  <!-- Empty -->
  <template x-if="!loading && products.length === 0">
    <div class="text-center py-16 text-gray-400">
      <svg class="w-12 h-12 mx-auto mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
      </svg>
      <p class="text-sm font-medium text-gray-500">Nenhum produto cadastrado</p>
      <p class="text-xs mt-1">Adicione produtos para que o AI os conheça automaticamente</p>
    </div>
  </template>

  <!-- List -->
  <div class="space-y-3">
    <template x-for="p in products" :key="p.id">
      <div class="bg-white border border-gray-200 rounded-xl p-4 flex items-start gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="font-semibold text-gray-800 text-sm" x-text="p.name"></span>
            <template x-if="p.price">
              <span class="text-xs font-medium text-green-600 bg-green-50 border border-green-200 px-2 py-0.5 rounded-full"
                x-text="'R$ ' + parseFloat(p.price).toFixed(2).replace('.',',')"></span>
            </template>
            <template x-if="!p.active">
              <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">inativo</span>
            </template>
          </div>
          <p x-show="p.description" class="text-xs text-gray-500 line-clamp-2" x-text="p.description"></p>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <button @click="toggleActive(p)" :title="p.active ? 'Desativar' : 'Ativar'"
            class="p-1.5 rounded-lg text-gray-400 hover:text-amber-500 hover:bg-amber-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                x-bind:d="p.active
                  ? 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21'
                  : 'M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z'"/>
            </svg>
          </button>
          <button @click="openEdit(p)"
            class="p-1.5 rounded-lg text-gray-400 hover:text-blue-600 hover:bg-blue-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button @click="remove(p.id)"
            class="p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>
    </template>
  </div>

  <!-- Modal -->
  <div x-show="showForm" x-cloak
    class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
    @click.self="showForm = false">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md">
      <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
        <h2 class="font-semibold text-gray-800" x-text="editingId ? 'Editar produto' : 'Novo produto'"></h2>
        <button @click="showForm = false" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="px-6 py-4 space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Nome *</label>
          <input x-model="form.name" type="text" placeholder="ex: Pacote Easter"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Preço (R$)</label>
          <input x-model="form.price" type="text" placeholder="ex: 149.90"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Descrição</label>
          <textarea x-model="form.description" rows="3" placeholder="Descreva o produto para o AI..."
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="prod-active" x-model="form.active" class="w-4 h-4 rounded text-blue-600"/>
          <label for="prod-active" class="text-sm text-gray-600">Produto ativo (visível para o AI)</label>
        </div>
        <p x-show="error" x-text="error" class="text-sm text-red-500"></p>
      </div>
      <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3">
        <button @click="showForm = false"
          class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Cancelar</button>
        <button @click="save()" :disabled="saving"
          class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors disabled:opacity-50">
          <span x-text="saving ? 'Salvando...' : 'Salvar'"></span>
        </button>
      </div>
    </div>
  </div>
</div>
{{ end }}
